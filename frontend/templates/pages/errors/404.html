{% extends 'layouts/base.html' %}

{% block title %}Page Not Found - TravixPay{% endblock %}

{% block body_content %}
<div class="min-h-screen flex flex-col items-center justify-center bg-brand-grayBg px-4">
    <div class="text-center max-w-md">
        <!-- Error Icon -->
        <div class="w-20 h-20 bg-blue-50 text-blue-400 rounded-full flex items-center justify-center text-3xl mx-auto mb-6 shadow-inner border border-blue-100">
            <i class="fa-solid fa-map-location-question"></i>
        </div>

        <h1 class="text-6xl font-black text-brand-blue tracking-tight">404</h1>
        <h2 class="text-xl font-bold text-brand-blue mt-2">Page Not Found</h2>
        <p class="text-sm text-gray-500 mt-3 font-medium">
            The page you're looking for doesn't exist or has been moved. Check the URL or head back to safety.
        </p>

        <div class="mt-8 flex flex-col sm:flex-row gap-3 justify-center">
            <a href="{% url 'accounts:passenger_dashboard' %}" class="inline-flex items-center justify-center py-3 px-6 border border-transparent rounded-xl shadow-md text-sm font-semibold text-white bg-brand-blue hover:bg-slate-900 transition duration-150">
                <i class="fa-solid fa-house mr-2"></i>Go to Dashboard
            </a>
            <button onclick="history.back()" class="inline-flex items-center justify-center py-3 px-6 border border-gray-200 rounded-xl text-sm font-semibold text-gray-700 bg-white hover:bg-gray-50 transition duration-150">
                <i class="fa-solid fa-arrow-left mr-2"></i>Go Back
            </button>
        </div>
    </div>
</div>
{% endblock %}
