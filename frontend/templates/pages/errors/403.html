{% extends 'layouts/base.html' %}

{% block title %}Access Denied - TravixPay{% endblock %}

{% block body_content %}
<div class="min-h-screen flex flex-col items-center justify-center bg-brand-grayBg px-4">
    <div class="text-center max-w-md">
        <!-- Error Icon -->
        <div class="w-20 h-20 bg-amber-50 text-amber-500 rounded-full flex items-center justify-center text-3xl mx-auto mb-6 shadow-inner border border-amber-100">
            <i class="fa-solid fa-shield-halved"></i>
        </div>

        <h1 class="text-6xl font-black text-brand-blue tracking-tight">403</h1>
        <h2 class="text-xl font-bold text-brand-blue mt-2">Access Denied</h2>
        <p class="text-sm text-gray-500 mt-3 font-medium">
            You don't have permission to access this page. This resource requires a different account role.
        </p>

        <div class="mt-8 flex flex-col sm:flex-row gap-3 justify-center">
            <a href="{% url 'accounts:passenger_dashboard' %}" class="inline-flex items-center justify-center py-3 px-6 border border-transparent rounded-xl shadow-md text-sm font-semibold text-white bg-brand-blue hover:bg-slate-900 transition duration-150">
                <i class="fa-solid fa-house mr-2"></i>Go to Dashboard
            </a>
            <a href="{% url 'accounts:login' %}" class="inline-flex items-center justify-center py-3 px-6 border border-gray-200 rounded-xl text-sm font-semibold text-gray-700 bg-white hover:bg-gray-50 transition duration-150">
                <i class="fa-solid fa-right-from-bracket mr-2"></i>Switch Account
            </a>
        </div>
    </div>
</div>
{% endblock %}
