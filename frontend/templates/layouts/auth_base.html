{% extends 'layouts/base.html' %}

{% block body_content %}
<div class="min-h-full flex flex-col justify-center py-12 sm:px-6 lg:px-8 bg-brand-grayBg">
    <div class="sm:mx-auto sm:w-full sm:max-w-md">
        <!-- Logo Icon & Brand Name -->
        <div class="flex items-center justify-center gap-3">
            <div class="w-12 h-12 rounded-xl bg-brand-blue flex items-center justify-center text-white text-2xl shadow-md">
                <i class="fa-solid fa-plane-departure text-brand-green"></i>
            </div>
            <span class="text-2xl font-extrabold text-brand-blue tracking-tight">Travix<span class="text-brand-blueLight">Pay</span></span>
        </div>
        <h2 class="mt-6 text-center text-3xl font-extrabold tracking-tight text-brand-blue">
            {% block auth_heading %}{% endblock %}
        </h2>
        <p class="mt-2 text-center text-sm text-gray-600">
            {% block auth_subheading %}{% endblock %}
        </p>
    </div>

    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
        <div class="bg-white py-8 px-4 shadow-xl rounded-2xl sm:px-10 border border-gray-100">
            {% block auth_form %}{% endblock %}
        </div>
    </div>
</div>
{% endblock %}
